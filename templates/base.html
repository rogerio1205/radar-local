<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ROTA LOCAL{% endblock %}</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; background: #0b0d10; color: #e9eef5; }
    a { color: #8ad; text-decoration: none; }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 14px;
      border-bottom: 1px solid #1b2330;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo { height: 36px; }

    .brand-text {
     font-size: 34px; /* antes era ~20px */
     font-weight: 800;
     color: #ffffff;
     letter-spacing: .6px;
     text-decoration: none;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      background: #2d6cdf;
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
    }

    .btn2 {
      display: inline-block;
      background: transparent;
      color: #e9eef5;
      border: 1px solid #2a3445;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: background .15s, border-color .15s, color .15s;
    }

    .btn2:hover {
      background: #11151b;
      border-color: #4285f4;
      color: #fff;
    }

    .nav-active {
      background: #0d1a2e !important;
      border-color: #4285f4 !important;
      color: #7ab3ff !important;
    }

    .hello {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #1b2330;
      border-radius: 10px;
      background: #11151b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>

      <!-- LOGO -->
      <a class="brand" href="/mapa-v2">
        <img src="/static/logo.png" class="logo">
        <span class="brand-text">ROTA LOCAL</span>
      </a>

      <nav>

        <!-- BOTÃO ORIGINAL (AGORA COM ID) -->
        <a id="btn-topo-gps"
           class="btn2 {% if request.url.path == '/mapa-v2' %}nav-active{% endif %}"
           href="#">📍 Rota Local</a>

        {% if current_user %}
          <span class="hello">
            Bem-vindo, <strong>{{ current_user.name }}</strong>
          </span>
          <form method="post" action="/logout" style="display:inline;margin:0;">
            <button class="btn2" type="submit">Sair</button>
          </form>
        {% else %}
          <a class="btn" href="/login">Entrar</a>
          <a class="btn2" href="/register">Criar conta</a>
          <a class="btn2" href="/empresa/comecar">Cadastrar minha empresa</a>
          <a class="btn2" href="/admin-login">Administração</a>
        {% endif %}
      </nav>
    </header>

    {% block content %}{% endblock %}
  </div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const topoBtn = document.getElementById("btn-topo-gps");

  if (topoBtn) {
    topoBtn.addEventListener("click", function (e) {
      e.preventDefault();

      const gpsBtn = document.getElementById("btn-near-me");

      if (gpsBtn) {
        gpsBtn.click();
      } else {
        window.location.href = "/mapa-v2";
      }
    });
  }
});
</script>

</body>
</html>
