{% extends "base.html" %}
{% block title %}Cadastrar Empresa - Vendas1{% endblock %}

{% block content %}
<div class="card" style="max-width:720px;">
  <h2 style="margin-top:0;">Cadastrar minha empresa</h2>
  <div class="muted">Após cadastrar, o admin aprova para sua empresa aparecer no portal.</div>

  <form method="post" action="/empresa/cadastrar" style="margin-top:14px;">
    <label>Nome fantasia*</label><br>
    <input name="name" required style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a3445;"><br><br>

    <label>Email de contato*</label><br>
    <input name="email" type="email" required style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a3445;"><br><br>

    <label>Telefone</label><br>
    <input name="phone" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a3445;"><br><br>

    <label>Endereço</label><br>
    <input name="address" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a3445;"><br><br>

    <label>Website</label><br>
    <input name="website" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a3445;"><br><br>

    <label>Instagram</label><br>
    <input name="instagram" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a3445;"><br><br>

    <label>Descrição</label><br>
    <textarea name="description" style="width:100%;min-height:90px;padding:10px;border-radius:10px;border:1px solid #2a3445;"></textarea><br><br>

    <button class="btn" type="submit">Cadastrar empresa</button>
  </form>
</div>
{% endblock %}
