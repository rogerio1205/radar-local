<!doctype html>
<html>
<head>
<title>Produtos da Empresa</title>
</head>

<body>

<h2>Produtos da Empresa {{empresa_id}}</h2>

<a href="/empresas/{{empresa_id}}/produtos/novo">
<button>Novo Produto</button>
</a>

<table border="1" cellpadding="5">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Preço</th>
</tr>

{% for p in products %}
<tr>
<td>{{p.id}}</td>
<td>{{p.name}}</td>
<td>{{p.price}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
